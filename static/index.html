<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#66bb6a">
<link rel="manifest" href="/static/manifest.json">
<title>蜜雪宣城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#e8f5e9 0%,#e3f2ef 30%,#f1f8e9 60%,#e0f2f1 100%);height:100dvh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;bottom:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(129,199,132,.10);pointer-events:none}
body::after{content:'';position:fixed;top:-40px;left:-40px;width:160px;height:160px;border-radius:50%;background:rgba(77,182,172,.08);pointer-events:none}
.snow-bg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.06;pointer-events:none;z-index:0;width:260px;height:260px}
header{background:linear-gradient(135deg,#66bb6a,#4db6ac);color:#fff;padding:14px 18px;text-align:center;font-size:17px;font-weight:600;letter-spacing:0.5px;box-shadow:0 2px 8px rgba(76,175,80,.15)}
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px}
.bubble-row{display:flex;align-items:flex-end;gap:6px;max-width:85%;animation:fadeIn .25s;position:relative;z-index:1}
.bubble-row.user{align-self:flex-end;flex-direction:row-reverse}
.bubble-row.agent{align-self:flex-start}
.bubble-row .avatar{font-size:22px;flex-shrink:0}
.bubble-row .text{padding:12px 15px;border-radius:16px;font-size:15px;line-height:1.6;word-break:break-word}
.bubble-row.user .text{background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;border-bottom-right-radius:4px}
.bubble-row.agent .text{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(76,175,80,.08)}
.bubble-row.loading .text{background:#fff;color:#999;font-style:italic}
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:6px 12px 10px;position:relative;z-index:1}
.quick-replies button{background:rgba(255,255,255,.85);border:1.5px solid #c8e6c9;border-radius:18px;padding:7px 13px;font-size:13px;cursor:pointer;white-space:nowrap;color:#388e3c}
.quick-replies button:active{background:linear-gradient(135deg,#66bb6a,#4db6ac);color:#fff;border-color:transparent}
#input-bar{display:flex;padding:10px 12px 14px;gap:8px;background:rgba(255,255,255,.9);border-top:1px solid #e0e0e0}
#input-bar input{flex:1;padding:11px 14px;border:1.5px solid #c8e6c9;border-radius:22px;font-size:15px;outline:none;background:#fff}
#input-bar input:focus{border-color:#66bb6a}
#input-bar button{background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;border:none;border-radius:22px;padding:11px 20px;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 2px 6px rgba(76,175,80,.2)}
#input-bar button:active{transform:scale(.96)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<svg class="snow-bg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="145" r="35" fill="#e0e0e0"/>
  <circle cx="100" cy="117" r="28" fill="#eee"/>
  <circle cx="100" cy="94" r="22" fill="#f5f5f5"/>
  <circle cx="93" cy="88" r="2.5" fill="#333"/>
  <circle cx="107" cy="88" r="2.5" fill="#333"/>
  <ellipse cx="100" cy="97" rx="3" ry="2" fill="#ff8a80"/>
  <path d="M90 82 Q95 74 100 75 Q105 74 110 82 L108 70 L105 64 L100 68 L95 64 L92 70 Z" fill="#ffb300"/>
  <rect x="97" y="54" width="6" height="12" rx="3" fill="#ffb300"/>
  <circle cx="100" cy="52" r="4" fill="#ffb300"/>
  <path d="M78 120 Q68 110 72 100" stroke="#e0e0e0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M122 120 Q132 110 128 100" stroke="#e0e0e0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="76" y="138" width="48" height="6" rx="3" fill="#ffb300"/>
  <rect x="74" y="146" width="4" height="10" rx="2" fill="#ffb300"/>
</svg>
<header>☕ 蜜雪宣城</header>
<div id="chat"></div>
<div class="quick-replies" id="quick-replies">
  <button onclick="quickSend('🧊 推荐一杯冰咖啡')">🧊 冰美式</button>
  <button onclick="quickSend('☕ 想喝热的拿铁')">☕ 热拿铁</button>
  <button onclick="quickSend('🍵 来杯清爽的果茶')">🍵 清爽果茶</button>
  <button onclick="quickSend('🥤 奶茶推荐一下')">🥤 奶茶</button>
</div>
<div id="input-bar">
  <input id="msg" type="text" placeholder="说说你想喝什么..." autocomplete="off">
  <button onclick="send()">发送</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('msg');
const USER_ID = 'user_' + Math.random().toString(36).slice(2, 8);
const AGENT_FACES = ['☺️','😊','🥰','😋','💕','🌸','🐣','🧋','🍃','✨'];

function addBubble(text, role) {
  const row = document.createElement('div');
  row.className = 'bubble-row ' + role;
  const face = role === 'user' ? '😎' : AGENT_FACES[Math.floor(Math.random() * AGENT_FACES.length)];
  row.innerHTML = '<span class="avatar">' + face + '</span><span class="text"></span>';
  row.querySelector('.text').textContent = text;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  const row = document.createElement('div');
  row.className = 'bubble-row agent loading';
  row.id = 'loading';
  row.innerHTML = '<span class="avatar">🤔</span><span class="text">正在为您挑选...</span>';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function send(msg) {
  if (!msg) msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addBubble(msg, 'user');
  addLoading();
  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_id: USER_ID, message: msg}),
    });
    const data = await resp.json();
    removeLoading();
    addBubble(data.reply, 'agent');
  } catch(e) {
    removeLoading();
    addBubble('网络出错了，请稍后再试 🥺', 'agent');
  }
}

function quickSend(msg) { send(msg); }

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js');
}
</script>
</body>
</html>
