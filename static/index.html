<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5B3E2E">
<link rel="manifest" href="/static/manifest.json">
<title>蜜雪宣城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#faf7f2;height:100dvh;display:flex;flex-direction:column}
header{background:#5B3E2E;color:#fff;padding:14px 18px;text-align:center;font-size:17px;font-weight:600;letter-spacing:0.5px}
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px}
.bubble-row{display:flex;align-items:flex-end;gap:6px;max-width:85%;animation:fadeIn .25s}
.bubble-row.user{align-self:flex-end;flex-direction:row-reverse}
.bubble-row.agent{align-self:flex-start}
.bubble-row .avatar{font-size:22px;flex-shrink:0}
.bubble-row .text{padding:12px 15px;border-radius:16px;font-size:15px;line-height:1.6;word-break:break-word}
.bubble-row.user .text{background:#5B3E2E;color:#fff;border-bottom-right-radius:4px}
.bubble-row.agent .text{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.bubble-row.loading .text{background:#fff;color:#999;font-style:italic}
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:6px 12px 10px}
.quick-replies button{background:#fff;border:1.5px solid #e0d6cc;border-radius:18px;padding:7px 13px;font-size:13px;cursor:pointer;white-space:nowrap}
.quick-replies button:active{background:#5B3E2E;color:#fff;border-color:#5B3E2E}
#input-bar{display:flex;padding:10px 12px 14px;gap:8px;background:#fff;border-top:1px solid #eee}
#input-bar input{flex:1;padding:11px 14px;border:1.5px solid #e0d6cc;border-radius:22px;font-size:15px;outline:none;background:#faf7f2}
#input-bar input:focus{border-color:#5B3E2E}
#input-bar button{background:#5B3E2E;color:#fff;border:none;border-radius:22px;padding:11px 20px;font-size:15px;font-weight:500;cursor:pointer}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header>☕ 蜜雪宣城</header>
<div id="chat"></div>
<div class="quick-replies" id="quick-replies">
  <button onclick="quickSend('🧊 推荐一杯冰咖啡')">🧊 冰咖啡</button>
  <button onclick="quickSend('☕ 想喝热的拿铁')">☕ 热拿铁</button>
  <button onclick="quickSend('🍵 来杯清爽的果茶')">🍵 清爽果茶</button>
  <button onclick="quickSend('🥤 奶茶推荐一下')">🥤 奶茶</button>
</div>
<div id="input-bar">
  <input id="msg" type="text" placeholder="说说你想喝什么..." autocomplete="off">
  <button onclick="send()">发送</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('msg');
const USER_ID = 'user_' + Math.random().toString(36).slice(2, 8);
const AGENT_FACES = ['☺️','😊','🥰','😋','💕','🌸','🐣','🧋','🍃','✨'];

function addBubble(text, role) {
  const row = document.createElement('div');
  row.className = 'bubble-row ' + role;
  const face = role === 'user' ? '😎' : AGENT_FACES[Math.floor(Math.random() * AGENT_FACES.length)];
  row.innerHTML = '<span class="avatar">' + face + '</span><span class="text"></span>';
  row.querySelector('.text').textContent = text;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  const row = document.createElement('div');
  row.className = 'bubble-row agent loading';
  row.id = 'loading';
  row.innerHTML = '<span class="avatar">🤔</span><span class="text">正在为您挑选...</span>';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function send(msg) {
  if (!msg) msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addBubble(msg, 'user');
  addLoading();
  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_id: USER_ID, message: msg}),
    });
    const data = await resp.json();
    removeLoading();
    addBubble(data.reply, 'agent');
  } catch(e) {
    removeLoading();
    addBubble('网络出错了，请稍后再试 🥺', 'agent');
  }
}

function quickSend(msg) { send(msg); }

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js');
}
</script>
</body>
</html>
